name: Build & Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'doc/**'
      - 'src/**'
      - 'Aetherion/**'
      - 'get_project_name.py'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz cmake make

      - name: Generate Doxyfile from template
        run: |
          # Substitute all @CMAKE_*@ and @DOXYGEN_*@ placeholders from Doxyfile.in
          REPO="$(pwd)"
          mkdir -p "${REPO}/build/doc/doxygen"
          sed \
            -e "s|@CMAKE_PROJECT_NAME@|Aetherion|g" \
            -e "s|@CMAKE_SOURCE_DIR@|${REPO}|g" \
            -e "s|@CMAKE_BINARY_DIR@|${REPO}/build|g" \
            -e "s|@DOXYGEN_OUTPUT_DIR@|${REPO}/build/doc/doxygen|g" \
            doc/Doxyfile.in > build/Doxyfile

      - name: Build Doxygen XML
        run: |
          doxygen build/Doxyfile
          ls build/doc/doxygen/xml/index.xml

      - name: Build Sphinx HTML
        run: |
          sphinx-build -T -b html \
            -Dbreathe_projects.Aetherion=$(pwd)/build/doc/doxygen/xml \
            doc/ build/doc/sphinx

      - name: Upload HTML docs to GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/doc/sphinx

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

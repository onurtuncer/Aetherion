name: Build & Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'doc/**'
      - 'src/**'
      - 'Aetherion/**'
      - 'get_project_name.py'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz

      - name: Build Doxygen XML  (needed by breathe even if no directives used)
        run: |
          REPO="$(pwd)"
          OUT="${REPO}/build/doxygen"
          mkdir -p "${OUT}"
          # Materialise the Doxyfile from the template
          sed \
            -e "s|@CMAKE_PROJECT_NAME@|Aetherion|g" \
            -e "s|@CMAKE_SOURCE_DIR@|${REPO}|g" \
            -e "s|@CMAKE_BINARY_DIR@|${REPO}/build|g" \
            -e "s|@DOXYGEN_OUTPUT_DIR@|${OUT}|g" \
            doc/Doxyfile.in > "${REPO}/build/Doxyfile"
          doxygen "${REPO}/build/Doxyfile"

      - name: Build Sphinx HTML
        run: |
          sphinx-build -T -b html \
            -Dbreathe_projects.Aetherion="$(pwd)/build/doxygen/xml" \
            doc/ build/sphinx

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/sphinx

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

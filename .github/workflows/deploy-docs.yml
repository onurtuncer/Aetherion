name: Build & Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'doc/**'
      - 'src/**'
      - 'get_project_name.py'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme
          pip install -r doc/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz make

      - name: Configure (docs only)
        run: cmake -B build -DBUILD_DOCS=ON

      - name: Build docs (Doxygen XML)
        run: |
          doxygen build/doc/Doxyfile
          ls build/doc/doxygen/xml/index.xml

      - name: Build docs (Sphinx HTML)
        run: |
          sphinx-build -b html \
            -Dbreathe_projects.Aetherion=$(pwd)/build/doc/doxygen/xml \
            doc/ build/doc/sphinx

      - name: List Sphinx output
        run: ls -R build/doc/sphinx

      - name: Upload HTML docs to GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/doc/sphinx

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

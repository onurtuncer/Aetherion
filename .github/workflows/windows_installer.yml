name: Windows Installer

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq doxygen graphviz \
            texlive-latex-extra texlive-pictures texlive-fonts-recommended \
            poppler-utils

      - name: Build TikZ figures to PNG
        run: |
          REPO="$(pwd)"
          TIKZ_SRC="${REPO}/doc/tikz"
          TIKZ_BUILD="${REPO}/build/tikz"
          STATIC_OUT="${REPO}/doc/_static"
          mkdir -p "${TIKZ_BUILD}"
          for tex in "${TIKZ_SRC}"/*.tex; do
            fig=$(basename "${tex}" .tex)
            pdflatex -interaction=nonstopmode -halt-on-error \
                     -output-directory "${TIKZ_BUILD}" "${tex}"
            pdftoppm -r 200 -png -singlefile \
                     "${TIKZ_BUILD}/${fig}.pdf" "${STATIC_OUT}/${fig}"
          done

      - name: Generate Doxyfile and build XML
        run: |
          REPO="$(pwd)"
          OUT="${REPO}/build/doxygen"
          mkdir -p "${OUT}"
          sed \
            -e "s|@CMAKE_PROJECT_NAME@|Aetherion|g" \
            -e "s|@CMAKE_SOURCE_DIR@|${REPO}|g" \
            -e "s|@CMAKE_BINARY_DIR@|${REPO}/build|g" \
            -e "s|@DOXYGEN_OUTPUT_DIR@|${OUT}|g" \
            doc/Doxyfile.in > "${REPO}/build/Doxyfile"
          doxygen "${REPO}/build/Doxyfile"

      - name: Build Sphinx HTML
        run: |
          sphinx-build -T -b html \
            -Dbreathe_projects.Aetherion="$(pwd)/build/doxygen/xml" \
            doc/ build/sphinx

      - name: Upload Sphinx HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: aetherion-docs-html
          path: build/sphinx

  build-msi:
    needs: build-docs
    runs-on: windows-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y --no-progress

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          $wixBin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3*\bin" -Directory |
            Select-Object -First 1 -ExpandProperty FullName
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      - name: Download Sphinx HTML docs
        uses: actions/download-artifact@v8
        with:
          name: aetherion-docs-html
          path: build/sphinx-docs

      - name: Configure
        run: cmake --preset release -DAETHERION_INSTALL=ON -DAETHERION_DOCS_HTML_DIR="${{ github.workspace }}/build/sphinx-docs"

      - name: Build
        run: cmake --build --preset release

      - name: Build MSI installer (CPack + WiX)
        working-directory: out/build/windows-release
        run: cpack -G WIX

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: Aetherion-installer-${{ github.ref_name }}
          path: out/build/windows-release/*.msi

      - name: Attach MSI to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/build/windows-release/*.msi

# .codecov.yml
codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 10%

ignore:
  - "tests/**"
  - "vendor/**"
  - "cmake/**"
  - "**/_deps/**"
  - "**/CMakeFiles/**"
  - "*/Catch2/**"
  - "/usr/**"
  - "src/Examples/**"
  - "src/FMU/**"
  - "Aetherion/Examples/**"
  - "Aetherion/Simulation/EntryPoint.h"
# ------------------------------------------------------------------------------
# NASA TM-2015-218675  —  Atmospheric Scenario 2
# Tumbling brick, no aerodynamic damping  |  J2 gravity  |  US 1976 atmosphere
#
# All values in SI units.
# Reference: NASA TM-2015-218675, Section B.1.2 / Table 26.
#
# Inertia tensor (1 : 2 : 3 slug·ft² ratio):
#   1 slug·ft² = 14.593902937206 kg × (0.3048 m)² = 1.355817948329 kg·m²
#
# Initial angular rates (body wrt ECI, in body frame):
#   p₀ = 10 deg/s,  q₀ = 20 deg/s,  r₀ = 30 deg/s
# Stored as ECEF-relative rates; BuildInitialStateVector adds R^T · ω_E
# to recover the inertial rate:  ω_B/ECI = ω_B/ECEF + R^T · [0, 0, ω_E]
#   roll  = 10°/s − ω_E  (R^T·ω_E ≈ [ω_E, 0, 0] at equator)
#   pitch = 20°/s
#   yaw   = 30°/s
# ------------------------------------------------------------------------------

pose:
  lat_deg:    0.0    # deg  — geodetic latitude
  lon_deg:    0.0    # deg  — geodetic longitude
  alt_m:   9144.0    # m    — geometric altitude MSL  (= 30 000 ft)

  azimuth_deg: 0.0   # deg  — heading (nose azimuth from North)
  zenith_deg: 90.0   # deg  — zenith angle of body +z axis (90 = horizontal)
  roll_deg:    0.0   # deg  — roll about body +z axis

velocityNED:
  vn_mps: 0.0        # m/s  — north component
  ve_mps: 0.0        # m/s  — east component
  vd_mps: 0.0        # m/s  — down component (positive downward)

bodyRates:
  p_rad_s:  0.17446000406919428   # rad/s  — roll  rate (ECEF-relative) = 10°/s − ω_E
  q_rad_s:  0.34906585039886591   # rad/s  — pitch rate (ECEF-relative) = 20°/s
  r_rad_s:  0.52359877559829883   # rad/s  — yaw   rate (ECEF-relative) = 30°/s

inertialParameters:
  mass_kg: 14.5939029372          # kg     (= 1.0 slug)

  Ixx_kg_m2: 1.355817948329279   # kg·m²  (= 1 slug·ft²)
  Iyy_kg_m2: 2.711635896658559   # kg·m²  (= 2 slug·ft²)
  Izz_kg_m2: 4.067453844987838   # kg·m²  (= 3 slug·ft²)
  Ixy_kg_m2: 0.0                 # kg·m²
  Iyz_kg_m2: 0.0                 # kg·m²
  Ixz_kg_m2: 0.0                 # kg·m²

  xbar_m: 0.0                    # m  — body-origin offset from CoG (x)
  ybar_m: 0.0                    # m  — body-origin offset from CoG (y)
  zbar_m: 0.0                    # m  — body-origin offset from CoG (z)

aerodynamicParameters:
  S_m2: 0.0    # m²   — reference area (no drag)

  CL:  0.0    # —    lift coefficient
  CD:  0.0    # —    drag coefficient (no aero damping)
  CY:  0.0    # —    side-force coefficient
  Cl:  0.0    # —    roll-moment coefficient
  Cm:  0.0    # —    pitch-moment coefficient
  Cn:  0.0    # —    yaw-moment coefficient
